- hosts: localhost
  connection: local
  vars:
          home: "{{ lookup('env','HOME') }}"
          dev_box_dir: "{{ lookup('env','DEVBOX') }}"
          private_repo: "{{ lookup('env','PRIVATE_GIT_REPO') }}"
  roles:
          - arch/utilities
          - arch/git
          - arch/pass
          - arch/tmux
          - { role: arch/vim, tags: ['vim'] }
          - arch/emacs
          # - mac-deps

