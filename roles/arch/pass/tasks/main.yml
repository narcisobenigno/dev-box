---

- name: 'Install pass'
  pacman:
          name: pass
          state: present

- name: 'retrieve configurations'
  git: repo="{{ private_repo }}/.password-store.git"
       dest={{ home }}/.password-store
       accept_hostkey=yes

- name: 'retrieve security informations'
  git: repo={{ private_repo }}/.gnupg.git
       dest={{ home }}/.gnupg
       accept_hostkey=yes

- file:
        path: "{{ home }}/.gnupg/gpg.conf"
        mode: 0600 
