---

- name: 'Vim installation'
  homebrew_cask: name=emacs state=present

- name: 'Link .emacs.d dir'
  file: src="{{ dev_box_dir }}/roles/emacs/files/emacs.d"
        path="{{ home }}/.emacs.d"
        state=link
        force=yes

- name: 'Link .vimrc'
  file: src="{{ dev_box_dir }}/roles/emacs/files/spacemacs"
        path="{{ home }}/.spacemacs"
        state=link
        force=yes
