---

- name: 'Tapping'
  homebrew_tap: tap={{ item }} state=present
  with_items:
    - nviennot/tmate
    - railwaycat/emacsmacport

- name: 'Utilities installation'
  homebrew: name={{ item }} state=present
  with_items:
    - boot2docker
    - libffi
    - gdbm
    - readline
    - ruby-install
    - chruby
    - jenv
    - wget
    - python
    - tmate
    - irssi
    - heroku-toolbelt
